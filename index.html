<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Premium Stopwatch</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI,sans-serif}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(-45deg,#020617,#0f172a,#312e81,#020617);background-size:400% 400%;animation:bg 12s infinite;color:#fff;overflow:hidden}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
body:before,body:after{content:"";position:fixed;width:350px;height:350px;border-radius:50%;filter:blur(90px);opacity:.25}
body:before{background:#00e5ff;left:-80px;top:-80px}body:after{background:#8b5cf6;right:-80px;bottom:-80px}
.card{width:min(430px,92vw);background:rgba(255,255,255,.08);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
h1{text-align:center;margin-bottom:18px}
#display{text-align:center;font-size:3.2rem;font-weight:700;letter-spacing:2px;text-shadow:0 0 15px #00e5ff}
#display span{font-size:2rem;color:#7dd3fc}
.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:24px 0}
button{padding:13px;border:none;border-radius:12px;color:#fff;font-weight:700;cursor:pointer;transition:.25s}
button:hover{transform:translateY(-2px)}
#start{background:#06b6d4}#lap{background:#7c3aed}#reset{background:#f97316}
#laps{max-height:220px;overflow:auto}
.lap{display:flex;justify-content:space-between;background:rgba(255,255,255,.06);padding:10px;border-radius:10px;margin-top:8px}
</style></head><body>
<div class="card"><h1>⏱ Premium Stopwatch</h1>
<div id="display">00:00:00.<span>00</span></div>
<div class="controls"><button id="start">Start</button><button id="lap" disabled>Lap</button><button id="reset">Reset</button></div>
<div id="laps"></div></div>
<script>
let start=0,elapsed=0,intv=null,running=false,laps=0;
const d=display,s=startBtn=document.getElementById("start"),l=lap=document.getElementById("lap"),r=reset=document.getElementById("reset"),list=document.getElementById("laps");
function fmt(t){let h=Math.floor(t/3600000),m=Math.floor(t%3600000/60000),sec=Math.floor(t%60000/1000),ms=Math.floor(t%1000/10);
return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}.<span>${String(ms).padStart(2,"0")}</span>`;}
function tick(){elapsed=Date.now()-start;d.innerHTML=fmt(elapsed);}
s.onclick=()=>{if(!running){start=Date.now()-elapsed;intv=setInterval(tick,10);running=true;s.textContent="Pause";l.disabled=false;}else{clearInterval(intv);running=false;s.textContent="Start";}};
r.onclick=()=>{clearInterval(intv);running=false;elapsed=0;laps=0;d.innerHTML='00:00:00.<span>00</span>';list.innerHTML='';s.textContent='Start';l.disabled=true;}
l.onclick=()=>{if(!running)return;laps++;let e=document.createElement("div");e.className="lap";e.innerHTML=`<b>Lap ${laps}</b><span>${d.innerHTML}</span>`;list.prepend(e);}
document.addEventListener("keydown",e=>{if(e.code==="Space"){e.preventDefault();s.click()}if(e.key==="l"||e.key==="L")l.click();if(e.key==="r"||e.key==="R")r.click();});
</script></body></html>
