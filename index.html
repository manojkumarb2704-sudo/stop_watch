<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <div class="stopwatch-display">
            <!-- Progress Ring -->
            <svg class="progress-ring" width="280" height="280">
                <circle class="progress-ring__circle-bg" stroke="#ffffff1a" stroke-width="8" fill="transparent" r="130" cx="140" cy="140"/>
                <circle class="progress-ring__circle" stroke="#00d2ff" stroke-width="8" stroke-linecap="round" fill="transparent" r="130" cx="140" cy="140"/>
            </svg>
            
            <div class="time-readout">
                <span id="display">00:00:00</span>
                <span id="millis">.00</span>
            </div>
        </div>

        <div class="controls">
            <button id="startStopBtn" class="btn start">Start</button>
            <button id="lapBtn" class="btn lap" disabled>Lap</button>
            <button id="resetBtn" class="btn reset">Reset</button>
        </div>

        <div class="laps-container">
            <ul id="lapsList"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
